@media(max-width:600px){

<script>
(function(){
  const saved=localStorage.getItem('cti_theme');
  const dark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(saved==='dark'||(!saved&&dark)){document.body.classList.add('dark');document.getElementById('dark-icon').className='ti ti-sun';}
})();

function toggleDark(){
  const on=document.body.classList.toggle('dark');
  document.getElementById('dark-icon').className=on?'ti ti-sun':'ti ti-moon';
  localStorage.setItem('cti_theme',on?'dark':'light');
}

let lang='pt';
function setLang(l){
  lang=l;
  const c=C[l];
  document.title=c.title;
  document.documentElement.lang=l;
  document.getElementById('page-h1').textContent=c.h1;
  document.getElementById('updated-txt').textContent=c.updated;
  document.getElementById('back-txt').textContent=c.back;
  document.getElementById('content').innerHTML=c.html;
  document.getElementById('footer-copy').textContent=c.copy;
  document.getElementById('lnk-terms').textContent=c.terms;
  document.getElementById('lnk-privacy').textContent=c.privacy;
  document.getElementById('lnk-cookies').textContent=c.cookies;
  document.querySelectorAll('.lang-pill').forEach(p=>p.classList.toggle('active',p.textContent===l.toUpperCase()));
  localStorage.setItem('cti_lang',l);
}
setLang(localStorage.getItem('cti_lang')||'pt');
function updateBackTop(){const btn=document.getElementById('back-top');if(!btn)return;const footer=document.querySelector('footer,.legal-footer');if(footer){const ft=footer.getBoundingClientRect().top;const vh=window.innerHeight;btn.style.bottom=ft<vh?(vh-ft+14)+'px':''}btn.classList.toggle('show',window.scrollY>350);}
window.addEventListener('scroll',updateBackTop);
</script>
