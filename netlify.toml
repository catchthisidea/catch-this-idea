# ── Catch This Idea — Netlify configuration ─────────────────

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# ── Security headers (todas as páginas) ─────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── API: sem cache, nunca ────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# ── Assets estáticos: cache longa ───────────────────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ────────────────────────────────────────────────
# Redirecionar raiz para a app (quando index.html for removida)
# [[redirects]]
#   from   = "/"
#   to     = "/index-app.html"
#   status = 302

# ── Scheduled Functions (cron jobs) ─────────────────────────
# Os schedules são definidos no próprio ficheiro .js (config.schedule)
# e reconhecidos automaticamente pelo Netlify ao fazer deploy.
#
# cron-data-retention    → "0 3 1 * *"   (dia 1 de cada mês, 03:00 UTC) ← RGPD Art. 5(1)(e)
# cron-monthly-summary   → "0 9 1 * *"   (dia 1 de cada mês, 09:00 UTC)
# cron-inactive-ideas    → "0 10 * * 1"  (segundas-feiras, 10:00 UTC)
# cron-wallet-reminder   → "0 10 * * 3"  (quartas-feiras, 10:00 UTC)
