body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.6;transition:background .25s,color .25s}
nav{display:flex;align-items:center;justify-content:space-between;padding:.85rem 2.5rem;border-bottom:1px solid var(--border);background:var(--paper);position:sticky;top:0;z-index:100}

.legal-wrap{max-width:780px;margin:0 auto;padding:3rem 2rem 5rem}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:2.5rem;transition:color .15s}
.back-link:hover{color:var(--ink)}
.legal-wrap h1{font-family:var(--serif);font-size:2.2rem;font-weight:400;line-height:1.15;margin-bottom:.5rem}
.legal-updated{font-size:13px;color:var(--muted);margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.legal-wrap h2{font-family:var(--serif);font-size:1.2rem;font-weight:400;color:var(--or1);margin:2rem 0 .7rem}

.legal-wrap strong{color:var(--ink);font-weight:500}
.legal-wrap a{color:var(--or1);text-decoration:none}
.legal-wrap a:hover{text-decoration:underline}

.cookie-table td:first-child{font-weight:500;color:var(--ink);white-space:nowrap}
.browser-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.6rem;margin-bottom:1rem}
.browser-item{background:var(--paper2);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;font-size:13.5px;color:var(--muted)}

<script>
(function(){
  const saved=localStorage.getItem('cti_theme');
  const dark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(saved==='dark'||(!saved&&dark)){document.body.classList.add('dark');document.getElementById('dark-icon').className='ti ti-sun';}
})();

function toggleDark(){
  const on=document.body.classList.toggle('dark');
  document.getElementById('dark-icon').className=on?'ti ti-sun':'ti ti-moon';
  localStorage.setItem('cti_theme',on?'dark':'light');
}

let lang='pt';
function setLang(l){
  lang=l;
  const c=C[l];
  document.title=c.title;
  document.documentElement.lang=l;
  document.getElementById('page-h1').textContent=c.h1;
  document.getElementById('updated-txt').textContent=c.updated;
  document.getElementById('back-txt').textContent=c.back;
  document.getElementById('content').innerHTML=c.html;
  document.getElementById('footer-copy').textContent=c.copy;
  document.getElementById('lnk-terms').textContent=c.terms;
  document.getElementById('lnk-privacy').textContent=c.privacy;
  document.getElementById('lnk-cookies').textContent=c.cookies;
  document.querySelectorAll('.lang-pill').forEach(p=>p.classList.toggle('active',p.textContent===l.toUpperCase()));
  localStorage.setItem('cti_lang',l);
}
setLang(localStorage.getItem('cti_lang')||'pt');
